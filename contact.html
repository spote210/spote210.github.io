<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Your Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            color: #333;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 30px;
        }
        
        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        nav ul li a:hover {
            color: #0070f3;
        }
        
        .page-header {
            text-align: center;
            padding: 80px 0 40px;
        }
        
        .page-header h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .page-header p {
            font-size: 18px;
            color: #666;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .contact-content {
            display: flex;
            justify-content: space-between;
            margin-bottom: 80px;
        }
        
        .contact-info {
            flex: 0 0 calc(40% - 20px);
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .contact-info h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }
        
        .contact-info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .contact-icon {
            margin-right: 15px;
            color: #0070f3;
        }
        
        .contact-text h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #333;
        }
        
        .contact-text p, .contact-text a {
            color: #666;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .contact-text a:hover {
            color: #0070f3;
        }
        
        .social-links {
            display: flex;
            margin-top: 40px;
        }
        
        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #f2f2f2;
            border-radius: 50%;
            margin-right: 10px;
            color: #333;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-links a:hover {
            background-color: #0070f3;
            color: #fff;
        }
        
        .contact-form {
            flex: 0 0 calc(60% - 20px);
            padding: 40px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .contact-form h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #0070f3;
            outline: none;
        }
        
        textarea.form-control {
            height: 150px;
            resize: vertical;
        }
        
        .btn {
            display: inline-block;
            background-color: #0070f3;
            color: #fff;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background-color: #0058c7;
            transform: translateY(-2px);
        }
        
        .map {
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .map img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        footer {
            background-color: #f2f2f2;
            padding: 30px 0;
            text-align: center;
        }
        
        footer p {
            color: #666;
        }
        
        /* Media Queries */
        @media (max-width: 768px) {
            .contact-content {
                flex-direction: column;
            }
            
            .contact-info, .contact-form {
                flex: 0 0 100%;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
