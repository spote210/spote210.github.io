<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work - Your Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            color: #333;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 30px;
        }
        
        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        nav ul li a:hover {
            color: #0070f3;
        }
        
        .page-header {
            text-align: center;
            padding: 80px 0 40px;
        }
        
        .page-header h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .page-header p {
            font-size: 18px;
            color: #666;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .portfolio-filters {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        
        .filter-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active, .filter-btn:hover {
            color: #0070f3;
        }
        
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .portfolio-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .portfolio-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .portfolio-info {
            padding: 20px;
            background-color: #fff;
        }
        
        .portfolio-category {
            font-size: 14px;
            color: #0070f3;
            margin-bottom: 5px;
        }
        
        .portfolio-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .portfolio-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .portfolio-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #0070f
